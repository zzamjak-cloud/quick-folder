name: "Publish Release"

on:
  push:
    tags:
      - 'v*' # v1.0.0 같은 태그가 푸시될 때 실행

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Mac 빌드용
            args: "--target universal-apple-darwin" # Intel/M1 통합 바이너리
          - platform: "windows-latest" # Windows 빌드용
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # 1. Node.js 환경 세팅
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. Rust 환경 세팅
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # 2-1. macOS universal binary를 위한 Rust 타겟 추가
      - name: install Rust targets for macOS
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      # 3. Rust 빌드 캐시 (빌드 속도 향상)
      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 4. 프론트엔드 의존성 설치
      - name: install frontend dependencies
        run: npm install

      # 4-1. 번들링할 외부 도구 다운로드 (FFmpeg, Ghostscript, Python+fonttools)
      - name: Download external tools for macOS
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries

          # FFmpeg (Homebrew static build)
          echo "📦 FFmpeg 다운로드 중..."
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          unzip -q ffmpeg.zip
          # universal binary를 3가지 이름으로 복사 (Tauri universal 빌드 지원)
          cp ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          cp ffmpeg src-tauri/binaries/ffmpeg-x86_64-apple-darwin
          cp ffmpeg src-tauri/binaries/ffmpeg-universal-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-*-apple-darwin

          # Ghostscript (Homebrew bottle)
          echo "📦 Ghostscript 다운로드 중..."
          brew fetch --force --bottle-tag=arm64_sonoma ghostscript
          GS_BOTTLE=$(brew --cache --bottle-tag=arm64_sonoma ghostscript)
          tar xzf "$GS_BOTTLE" -C /tmp
          # universal binary를 3가지 이름으로 복사
          cp /tmp/ghostscript/*/bin/gs src-tauri/binaries/gs-aarch64-apple-darwin
          cp /tmp/ghostscript/*/bin/gs src-tauri/binaries/gs-x86_64-apple-darwin
          cp /tmp/ghostscript/*/bin/gs src-tauri/binaries/gs-universal-apple-darwin
          chmod +x src-tauri/binaries/gs-*-apple-darwin

          # Python + fonttools (portable)
          echo "📦 Python + fonttools 패키징 중..."
          python3 -m venv /tmp/fonttools-venv
          /tmp/fonttools-venv/bin/pip install --upgrade pip fonttools
          # 3가지 아키텍처용 압축 파일 생성
          tar czf src-tauri/binaries/python-fonttools-aarch64-apple-darwin.tar.gz \
            -C /tmp/fonttools-venv .
          tar czf src-tauri/binaries/python-fonttools-x86_64-apple-darwin.tar.gz \
            -C /tmp/fonttools-venv .
          tar czf src-tauri/binaries/python-fonttools-universal-apple-darwin.tar.gz \
            -C /tmp/fonttools-venv .

          echo "✅ macOS 도구 준비 완료"
          ls -lh src-tauri/binaries/

      - name: Download external tools for Windows
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null

          # FFmpeg (gyan.dev essentials)
          Write-Host "📦 FFmpeg 다운로드 중..."
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" `
            -OutFile ffmpeg.zip
          Expand-Archive -Path ffmpeg.zip -DestinationPath ./ffmpeg_temp -Force
          $ffmpegExe = Get-ChildItem -Path ./ffmpeg_temp -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe

          # Ghostscript (공식 릴리스)
          Write-Host "📦 Ghostscript 다운로드 중..."
          Invoke-WebRequest `
            -Uri "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/gs10070/gs10070w64.exe" `
            -OutFile gs_installer.exe
          7z x gs_installer.exe -o"./gs_extracted" -y | Out-Null
          $gsExe = Get-ChildItem -Path "./gs_extracted" -Filter "gswin64c.exe" -Recurse | Select-Object -First 1
          Copy-Item $gsExe.FullName src-tauri/binaries/gs-x86_64-pc-windows-msvc.exe

          # Python + fonttools (GitHub Actions Python)
          Write-Host "📦 Python + fonttools 패키징 중..."
          pip install fonttools
          $pyDir = Split-Path (python -c "import sys; print(sys.executable)") -Parent
          Compress-Archive -Path "$pyDir\*" `
            -DestinationPath src-tauri/binaries/python-fonttools-x86_64-pc-windows-msvc.zip

          Write-Host "✅ Windows 도구 준비 완료"
          Get-ChildItem src-tauri/binaries/ | Format-Table Name, Length

      # 5. Tauri 빌드 및 GitHub Release 생성 (서명 포함)
      #    tauri-action이 latest.json을 자동 생성하여 Release에 업로드
      #    APPLE_SIGNING_IDENTITY="-": macOS ad-hoc 서명 + Hardened Runtime + 엔타이틀먼트 적용
      #    (없으면 linker-signed만 되어 TCC 권한이 영구 저장되지 않음)
      - name: build and release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "QuickFolder Widget v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
